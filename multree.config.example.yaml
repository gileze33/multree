# multree example manifest.
#
# Copy this file to ~/.multree/default.yaml (or any other profile name).
# Edit it to describe your own repos.
#
# multree reads the manifest from:
#   <$MULTREE_HOME or ~/.multree>/<profile>.yaml
#
# Profile resolution, in order:
#   1. --profile <name> CLI flag
#   2. $MULTREE_PROFILE env var
#   3. "default"
# Then aliases.json (one hop) gives the resolved profile name. Manage with
# `multree profile list|path|alias|unalias`.
#
# Once your manifest is in place: `multree create <group> --include <repo,...>`.

version: 1

# Parent directory for every group. Each group becomes
# <worktree_root>/<group-name>/<repo-basename>/.
worktree_root: ~/dev/worktree

# Default strategy used by `multree update` when no per-repo override and no
# --strategy flag is given. Either "rebase" (default) or "merge".
# update_strategy: merge

# What to do when a target branch is already checked out in a repo's main
# source: "switch" (default) moves the main checkout onto its branch_base
# (with leading "origin/" stripped), "detach" leaves it on a detached HEAD,
# "error" refuses to act. Per-repo overrides allowed.
# main_checkout_action: detach

# Concurrency cap for the prime / install phases of `multree create` (and
# the setup phase when parallel_setup is true). CLI `--jobs N` overrides
# this; default is the host's CPU count.
# jobs: 4

# Run the setup phase in parallel up to `jobs`, respecting depends_on.
# Default false: setup runs serially because it often touches shared
# resources (ports, databases). Flip on if your setup hooks are isolated.
# parallel_setup: true

# Manifest-level default hook timeout. Overridden by `repos.<name>.hooks.timeout`
# and individual hook objects' `timeout`. Accepts "5m", "30s", "500ms", or a
# bare number (seconds). No timeout if unset.
# hook_timeout: 10m

tools:
    # `multree <tool> <group>` runs the configured command inside the chosen
    # worktree. `open_in` is a preference chain -- `$root` is the group folder,
    # anything else is a repo key; first non-null wins.
    code:
        command: ["code", "{cwd}"]
        open_in: $root
    # Example: open Claude Code in the api worktree, falling back to the root.
    # claude:
    #     command: claude
    #     open_in: [api, $root]

repos:
    # Pick any short, stable key. Used on the CLI: `--include api,frontend`.
    api:
        # Absolute path (with ~/ expansion) to the main checkout.
        path: ~/dev/repo-a
        # Ref to fork new worktrees from. Defaults to origin/main.
        # branch_base: origin/develop
        hooks:
            # Runs in the new worktree after `prime_artifacts`. Optional.
            install: "pnpm install"
            # Runs after install. Optional. Use this to set up DB / pick ports / etc.
            setup: "pnpm run setup"
            # Runs on remove/destroy. Optional.
            teardown: "pnpm run teardown"
        # Read values from this worktree's env file after setup; other repos
        # reference them as {<repo>.<key>} in their consumes block.
        exposes:
            port:
                type: env_file
                file: .env.local
                key: API_PORT
        # Fallback values used when this repo is NOT included in the group --
        # e.g. point frontends at the default dev port.
        defaults:
            port: 5000
        # Override the manifest-level update_strategy for this repo. Optional.
        # update_strategy: rebase
        # Set to false to skip this repo in `multree push` (e.g. read-only
        # mirror). Defaults to true.
        # push: false
        # APFS reflink large trees (node_modules etc.) from the main checkout
        # into the worktree so install reconciles instead of cold-installing.
        prime_artifacts:
            - find: node_modules
              strategy: reflink

    frontend:
        path: ~/dev/repo-b
        hooks:
            install: "pnpm install"
            # Per-hook timeout overrides repo-level / manifest-level defaults.
            # setup:
            #     command: "pnpm run setup"
            #     timeout: 90s
        # frontend's setup waits for api's setup to finish (so api.port is
        # resolved before the templated value below is written).
        # depends_on: [api]
        # Write templated env vars into the worktree's env file, inside a block
        # bracketed by `# >>> multree-managed: <group> >>>` / `# <<< ... <<<`
        # so `rewire` is idempotent.
        consumes:
            file: .env.local
            upsert:
                API_URL: "http://localhost:{api.port}"
        prime_artifacts:
            - find: node_modules
              strategy: reflink

    # `consumes` can also be an array, for a monorepo with several env files:
    # web:
    #     path: ~/dev/repo-c
    #     hooks:
    #         install: "yarn install"
    #     consumes:
    #         - file: packages/app-one/.env
    #           upsert:
    #               REACT_APP_API_URL: "http://localhost:{api.port}"
    #         - file: packages/app-two/.env
    #           upsert:
    #               REACT_APP_API_URL: "http://localhost:{api.port}"
